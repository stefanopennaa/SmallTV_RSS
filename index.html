<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MeteoClock</title>
    <script>
        const theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        document.documentElement.setAttribute('data-bs-theme', theme);
    </script>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☀️</text></svg>">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f8f9fa;
            min-height: 100vh;
        }

        [data-bs-theme="dark"] body {
            background: #1a1a2e;
        }

        .card {
            background: white;
            border: 1px solid rgba(0, 0, 0, 0.08);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        [data-bs-theme="dark"] .card {
            background: rgba(30, 30, 30, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
        }

        .metric-card {
            position: relative;
            overflow: hidden;
        }

        .metric-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #FFD93D, #FF6B35);
        }

        .header {
            background: white;
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.08);
        }

        [data-bs-theme="dark"] .header {
            background: rgba(30, 30, 30, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header h1 {
            margin: 0;
            font-weight: 700;
            background: linear-gradient(135deg, #FFD93D 0%, #FF6B35 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .metric-value {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 700;
            margin: 0.5rem 0;
        }

        .metric-label {
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.7;
            font-weight: 600;
        }

        .btn-custom {
            background: linear-gradient(135deg, #FFD93D 0%, #FF6B35 100%);
            border: none;
            color: white;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 107, 53, 0.4);
            color: white;
        }

        .news-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .news-list::-webkit-scrollbar {
            width: 8px;
        }

        .news-list::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.05);
            border-radius: 10px;
        }

        .news-list::-webkit-scrollbar-thumb {
            background: rgba(255, 217, 61, 0.5);
            border-radius: 10px;
        }

        .news-list a {
            color: #FF6B35;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .news-list a:hover {
            color: #FFD93D;
            text-decoration: underline;
        }

        .form-range::-webkit-slider-thumb {
            background: linear-gradient(135deg, #FFD93D 0%, #FF6B35 100%);
        }

        .form-range::-moz-range-thumb {
            background: linear-gradient(135deg, #FFD93D 0%, #FF6B35 100%);
        }

        .loading {
            display: inline-block;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            font-weight: 600;
            background: rgba(255, 217, 61, 0.2);
            color: #FF6B35;
        }

        @media (max-width: 768px) {
            .container {
                padding-left: 1rem;
                padding-right: 1rem;
            }

            .header {
                padding: 1rem;
            }
        }
    </style>
</head>

<body>
    <div class="container py-4">
        <!-- Header -->
        <div class="header">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
                <h1 class="mb-0">☀️ MeteoClock</h1>
                <span class="status-badge" id="status">● Online</span>
            </div>
        </div>

        <div class="row g-3 g-md-4">
            <!-- Left column: weather data -->
            <div class="col-12 col-lg-4">
                <div class="d-flex flex-column gap-3">
                    <div class="card metric-card text-center p-4 rounded-4">
                        <div class="metric-label">Temperatura</div>
                        <div class="metric-value text-warning" id="temp">
                            <span class="loading">--</span>
                        </div>
                    </div>
                    <div class="card metric-card text-center p-4 rounded-4">
                        <div class="metric-label">Umidità</div>
                        <div class="metric-value text-info" id="hum">
                            <span class="loading">--</span>
                        </div>
                    </div>
                    <div class="card metric-card text-center p-4 rounded-4">
                        <div class="metric-label">Meteo</div>
                        <div class="fs-5 fw-bold mt-2" id="desc">
                            <span class="loading">--</span>
                        </div>
                    </div>
                    <div class="card metric-card text-center p-4 rounded-4">
                        <div class="metric-label">Indirizzo IP</div>
                        <div class="fs-6 fw-bold text-success mt-2" id="ip">
                            <span class="loading">--</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right column: actions and settings -->
            <div class="col-12 col-lg-8">
                <div class="d-flex flex-column gap-3">
                    <!-- Actions -->
                    <div class="card p-4 rounded-4">
                        <h5 class="mb-3 d-flex align-items-center gap-2">
                            <span>⚙️</span>
                            <span>Azioni</span>
                        </h5>
                        <div class="d-grid gap-2">
                            <a href="/update" class="btn btn-custom btn-lg rounded-4">
                                🔄 Aggiorna Firmware
                            </a>
                        </div>
                    </div>

                    <!-- Brightness -->
                    <div class="card p-4 rounded-4">
                        <h5 class="mb-3 d-flex align-items-center gap-2">
                            <span>💡</span>
                            <span>Luminosità</span>
                        </h5>
                        <div class="d-flex align-items-center gap-3">
                            <span style="font-size: 1.25rem;">🌑</span>
                            <input type="range" class="form-range flex-grow-1" min="0" max="255" id="brightness">
                            <span style="font-size: 1.25rem;">🌕</span>
                        </div>
                        <div class="text-center mt-3">
                            <span class="status-badge" id="brightness-label">--</span>
                        </div>
                    </div>

                    <!-- News -->
                    <div class="card p-4 rounded-4">
                        <h5 class="mb-3 d-flex align-items-center gap-2">
                            <span>📰</span>
                            <span>Notizie</span>
                        </h5>
                        <div id="news" class="news-list">
                            <div class="loading">Caricamento notizie...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="text-center mt-4 text-muted small">
            <p class="mb-0">Ultimo aggiornamento: <span id="last-update">--</span></p>
        </div>
    </div>

    <script>
        const slider = document.getElementById('brightness');
        const label = document.getElementById('brightness-label');
        const statusBadge = document.getElementById('status');
        const lastUpdate = document.getElementById('last-update');

        function updateTimestamp() {
            const now = new Date();
            lastUpdate.textContent = now.toLocaleTimeString('it-IT');
        }

        // --- Fetch data and sync slider with current device state ---
        fetch('/api')
            .then(r => {
                if (!r.ok) throw new Error('Network response was not ok');
                return r.json();
            })
            .then(d => {
                document.getElementById('temp').textContent = d.temp + '°C';
                document.getElementById('hum').textContent = d.humidity + '%';
                document.getElementById('desc').textContent = d.description;
                document.getElementById('ip').textContent = d.ip;

                // Sync slider to current brightness reported by device
                slider.value = d.brightness;
                label.textContent = Math.round(d.brightness / 255 * 100) + '%';

                statusBadge.textContent = '● Online';
                statusBadge.style.background = 'rgba(40, 167, 69, 0.2)';
                statusBadge.style.color = '#28a745';

                updateTimestamp();
            })
            .catch(err => {
                console.error('Error fetching data:', err);
                statusBadge.textContent = '● Offline';
                statusBadge.style.background = 'rgba(220, 53, 69, 0.2)';
                statusBadge.style.color = '#dc3545';
            });

        // Update label while dragging
        slider.addEventListener('input', () => {
            label.textContent = Math.round(slider.value / 255 * 100) + '%';
        });

        // Fetch news
        fetch('/news')
            .then(r => {
                if (!r.ok) throw new Error('Network response was not ok');
                return r.json();
            })
            .then(d => {
                const box = document.getElementById('news');
                if (!d.items || d.items.length === 0) {
                    box.innerHTML = '<p class="text-muted mb-0">Nessuna notizia disponibile</p>';
                    return;
                }
                const list = document.createElement('ul');
                list.className = 'ps-3 mb-0';
                d.items.forEach(item => {
                    const li = document.createElement('li');
                    li.className = 'mb-2';
                    const a = document.createElement('a');
                    a.href = item.link;
                    a.textContent = item.title || '(senza titolo)';
                    a.target = '_blank';
                    a.rel = 'noopener noreferrer';
                    li.appendChild(a);
                    list.appendChild(li);
                });
                box.innerHTML = '';
                box.appendChild(list);
            })
            .catch(err => {
                console.error('Error fetching news:', err);
                document.getElementById('news').innerHTML = '<p class="text-danger mb-0">Errore nel caricamento delle notizie</p>';
            });

        // Send value to device on release
        slider.addEventListener('change', () => {
            fetch('/brightness?value=' + slider.value)
                .then(() => {
                    // Visual feedback
                    label.style.background = 'rgba(40, 167, 69, 0.2)';
                    label.style.color = '#28a745';
                    setTimeout(() => {
                        label.style.background = '';
                        label.style.color = '';
                    }, 1000);
                })
                .catch(err => {
                    console.error('Error setting brightness:', err);
                    label.style.background = 'rgba(220, 53, 69, 0.2)';
                    label.style.color = '#dc3545';
                });
        });

        // Auto-refresh data every 60 seconds
        setInterval(() => {
            fetch('/api')
                .then(r => r.json())
                .then(d => {
                    document.getElementById('temp').textContent = d.temp + '°C';
                    document.getElementById('hum').textContent = d.humidity + '%';
                    document.getElementById('desc').textContent = d.description;
                    updateTimestamp();
                })
                .catch(err => console.error('Auto-refresh failed:', err));
        }, 60000);
    </script>
</body>

</html>
